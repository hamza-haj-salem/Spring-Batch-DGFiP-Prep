spring.application.name=DGFiP-Prep

# ===============================
# SERVER
# ===============================
server.port=8083

# ===============================
# POSTGRESQL
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/DGFip_girdb
#lorsque je lance l 'app dans docker , utilise cette url de bd :
#spring.datasource.url=jdbc:postgresql://host.docker.internal:5432/DGFip_girdb
spring.datasource.username=hamza
spring.datasource.password=hamza


spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# SPRING BATCH
# ===============================
spring.batch.jdbc.initialize-schema=always
spring.sql.init.mode=always
spring.batch.job.enabled=false